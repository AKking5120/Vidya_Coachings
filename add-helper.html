<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Add Photo / File Helper | Vidya Coachings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #1e3a5f; --accent: #f59e0b; --light: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Poppins, sans-serif; background: var(--light); color: #334155; padding: 24px 16px 48px; }
        .wrap { max-width: 560px; margin: 0 auto; }
        h1 { color: var(--primary); font-size: 1.35rem; margin-bottom: 6px; }
        .sub { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: inherit; font-weight: 600; cursor: pointer; background: #fff; color: #64748b; }
        .tab.active { background: var(--primary); color: #fff; }
        .panel { display: none; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
        .panel.active { display: block; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--primary); margin: 14px 0 6px; }
        label:first-child { margin-top: 0; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        .btn { width: 100%; margin-top: 18px; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-family: inherit; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #d97706; }
        .out { margin-top: 20px; }
        .out label { margin-top: 0; }
        textarea { width: 100%; min-height: 100px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: Consolas, monospace; font-size: 0.85rem; resize: vertical; }
        .copy { margin-top: 8px; padding: 8px 16px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .ok { color: #059669; font-size: 0.85rem; margin-top: 8px; display: none; }
        .tip { margin-top: 16px; padding: 12px; background: #fef3c7; border-radius: 8px; font-size: 0.85rem; }
        a.back { display: inline-block; margin-top: 20px; color: var(--primary); }
    </style>
</head>
<body>
<div class="wrap">
    <h1><i class="fas fa-magic"></i> Add Helper</h1>
    <p class="sub">Form bharo → code copy karo → data file mein paste karo</p>

    <div class="tabs">
        <button type="button" class="tab active" data-panel="photoPanel"><i class="fas fa-image"></i> Photo</button>
        <button type="button" class="tab" data-panel="filePanel"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>

    <div id="photoPanel" class="panel active">
        <label>Step 1: Image file path (folder mein rakho pehle)</label>
        <input type="text" id="photoSrc" placeholder="photo/photo201.jpeg">

        <label>Caption (alt text)</label>
        <input type="text" id="photoAlt" placeholder="Annual day 2026">

        <label>Gallery tab</label>
        <select id="photoCat">
            <option value="general">All Photos</option>
            <option value="students">Students</option>
            <option value="alumni">Alumni</option>
            <option value="achievements">Achievements</option>
        </select>

        <button type="button" class="btn" id="genPhoto">Generate code</button>

        <div class="out">
            <label>Copy this → paste in <strong>gallery-data.js</strong></label>
            <textarea id="photoOut" readonly></textarea>
            <button type="button" class="copy" data-target="photoOut">Copy</button>
            <p class="ok" id="photoOk">Copied!</p>
        </div>
        <p class="tip"><strong>File:</strong> <code>gallery-data.js</code> — array ke andar comma ke saath paste karo.</p>
    </div>

    <div id="filePanel" class="panel">
        <label>Step 1: PDF path (downloads/notes/ ya downloads/circulars/)</label>
        <input type="text" id="filePath" placeholder="downloads/notes/class10-maths.pdf">

        <label>Title</label>
        <input type="text" id="fileTitle" placeholder="Class 10 Maths Notes">

        <label>Type</label>
        <select id="fileCat">
            <option value="notes">Notes</option>
            <option value="circulars">Circular</option>
        </select>

        <label>Class</label>
        <input type="text" id="fileClass" value="All Classes">

        <label>Year</label>
        <input type="text" id="fileDate" value="2026">

        <button type="button" class="btn" id="genFile">Generate code</button>

        <div class="out">
            <label>Copy this → paste in <strong>downloads-data.js</strong></label>
            <textarea id="fileOut" readonly></textarea>
            <button type="button" class="copy" data-target="fileOut">Copy</button>
            <p class="ok" id="fileOk">Copied!</p>
        </div>
        <p class="tip"><strong>File:</strong> <code>downloads-data.js</code> — array ke andar paste karo.</p>
    </div>

    <a href="index.html" class="back"><i class="fas fa-arrow-left"></i> Back to site</a>
</div>

<script>
document.querySelectorAll('.tab').forEach(function (t) {
    t.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function (x) { x.classList.remove('active'); });
        t.classList.add('active');
        document.getElementById(t.getAttribute('data-panel')).classList.add('active');
    });
});

function esc(s) { return String(s || '').replace(/'/g, "\\'"); }

document.getElementById('genPhoto').addEventListener('click', function () {
    var src = document.getElementById('photoSrc').value.trim();
    var alt = document.getElementById('photoAlt').value.trim() || 'Photo';
    var cat = document.getElementById('photoCat').value;
    if (!src) { alert('Image path likho'); return; }
    document.getElementById('photoOut').value =
        "    { src: '" + esc(src) + "', alt: '" + esc(alt) + "', cat: '" + cat + "' },";
});

document.getElementById('genFile').addEventListener('click', function () {
    var file = document.getElementById('filePath').value.trim();
    var title = document.getElementById('fileTitle').value.trim();
    if (!file || !title) { alert('PDF path aur title likho'); return; }
    var cat = document.getElementById('fileCat').value;
    var cls = document.getElementById('fileClass').value.trim();
    var date = document.getElementById('fileDate').value.trim();
    document.getElementById('fileOut').value =
        "    {\n        title: '" + esc(title) + "',\n        category: '" + cat + "',\n        classLabel: '" + esc(cls) + "',\n        date: '" + esc(date) + "',\n        file: '" + esc(file) + "',\n        type: 'pdf'\n    },";
});

document.querySelectorAll('.copy').forEach(function (btn) {
    btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-target');
        var ta = document.getElementById(id);
        ta.select();
        navigator.clipboard.writeText(ta.value).then(function () {
            var ok = document.getElementById(id === 'photoOut' ? 'photoOk' : 'fileOk');
            ok.style.display = 'block';
            setTimeout(function () { ok.style.display = 'none'; }, 2000);
        });
    });
});
</script>
</body>
</html>
